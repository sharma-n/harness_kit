# agent_kit example config. One global file for all users; memory and tool
# permissions are per-user and live in the stores, never here.

agent:
  max_iterations: 6
  per_tool_timeout_s: 30.0
  system_prompt: |
    You are a helpful, friendly assistant with memory of past conversations.
    Use what you know about the user, but never invent facts.

memory:
  working:
    buffer_turns: 12
    buffer_token_budget: 2048
    idle_finalize_s: 900   # idle → embed conversation (kept resumable); must be < ttl_s
    ttl_s: 3600            # idle → evict session (already finalized by now)
    sweep_interval_s: 60   # how often the idle sweeper scans
  episodic:
    top_k: 3
    min_score: 0.3
    query_augment_turns: 2
    query_rewrite: false
  factual:
    extraction_enabled: true

context:
  max_input_tokens: 128000
  output_reserve_tokens: 4096
  safety_margin: 1024

stores:
  session_backend: memory
  profile_backend: memory
  vector_backend: memory
  permission_backend: memory
  redis:
    url: ${REDIS_URL:-redis://localhost:6379/0}
  sqlite:
    url: ${SQLITE_URL:-sqlite+aiosqlite:///agent_kit.db}
  qdrant:
    url: ${QDRANT_URL:-http://localhost:6333}
    collection: episodic_memory

mcp:
  # Bring your own MCP servers. Discovered tools are namespaced `{server}__{tool}`.
  # By default a discovered tool is unreachable until allowlisted (per-user grant or
  # `tools.default_allowed`); set `auto_allow: true` on a trusted server to fold its
  # tools into the default allowlist at startup. A server that fails to connect within
  # `startup_timeout_s` is logged and skipped (the rest still load).
  startup_timeout_s: 30.0
  servers: []
    # - name: filesystem            # local stdio subprocess
    #   transport: stdio
    #   command: npx
    #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/data"]
    #   auto_allow: true
    # - name: search                # remote streamable HTTP
    #   transport: http
    #   url: ${SEARCH_MCP_URL:-http://localhost:9000/mcp}

tools:
  # Global fallback allowlist for users with no per-user grant in the store.
  default_allowed:
    - remember_fact
    - forget_fact
    - list_facts
    - recall
  # Optional per-tool execution policy (keyed by tool name). Unset fields fall back to
  # globals: timeout → agent.per_tool_timeout_s, rate limit → unlimited. Rate limits are
  # per-user, in-process (so a multi-worker deploy enforces ~workers × the configured
  # rate). Both a timed-out and a rate-limited call become an ok=False tool observation.
  definitions: {}
    # slow_external_api:
    #   timeout_s: 60.0            # generous timeout for a slow upstream
    # remember_fact:
    #   rate_limit_per_minute: 30  # cap a high-volume tool per user

# Nested block handed wholesale to llm_kit's AppConfig.
llm_kit:
  llm:
    message_format: openai
    base_url: ${OPENAI_BASE_URL:-https://api.openai.com}
    model: ${AGENT_MODEL:-gpt-4o-mini}
    api_key_env: OPENAI_API_KEY
    max_tokens: 4096
  embed:
    base_url: ${OPENAI_BASE_URL:-https://api.openai.com}
    model: ${EMBED_MODEL:-text-embedding-3-small}
    api_key_env: OPENAI_API_KEY
  rate_limit:
    max_concurrent_requests: 16
    requests_per_minute: 500
