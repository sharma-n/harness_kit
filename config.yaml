# agent_kit example config. One global file for all users; memory and tool
# permissions are per-user and live in the stores, never here.

agent:
  max_iterations: 6
  per_tool_timeout_s: 30.0
  system_prompt: |
    You are a helpful, friendly assistant with memory of past conversations.
    Use what you know about the user, but never invent facts.
  # Block headers injected into the system message by the context builder.
  # Customize to match your assistant's persona or language.
  # factual_block_header: "What you know about this user:"
  # episodic_block_header: "Relevant memories from past conversations:"
  # summary_block_header: "Summary of earlier in this conversation:"

memory:
  working:
    buffer_turns: 12
    buffer_token_budget: 2048
    idle_finalize_s: 900   # idle → embed conversation (kept resumable); must be < ttl_s
    ttl_s: 3600            # idle → evict session (already finalized by now)
    sweep_interval_s: 60   # how often the idle sweeper scans
    # System prompt for the rollover summarizer (runs off the hot path when the
    # buffer exceeds buffer_token_budget).
    # rollover_system_prompt: "You maintain a running summary of a conversation. ..."
  episodic:
    top_k: 3
    min_score: 0.3
    query_augment_turns: 2
    query_rewrite: false
    # System prompt for the query-rewrite step (only used when query_rewrite: true).
    # query_rewrite_system_prompt: "Rewrite the user's text into a single standalone search query ..."
  factual:
    extraction_enabled: true
    # System prompt for post-turn fact extraction (only used when extraction_enabled: true).
    # extraction_system_prompt: "Extract durable facts about the user worth remembering ..."

context:
  max_input_tokens: 128000
  output_reserve_tokens: 4096
  safety_margin: 1024

stores:
  session_backend: memory
  profile_backend: memory
  vector_backend: memory
  permission_backend: memory
  redis:
    url: ${REDIS_URL:-redis://localhost:6379/0}
  sqlite:
    url: ${SQLITE_URL:-sqlite+aiosqlite:///agent_kit.db}
  qdrant:
    mode: ${QDRANT_MODE:-host}   # memory | file | host
    path: ${QDRANT_PATH:-qdrant_data}
    url: ${QDRANT_URL:-http://localhost:6333}
    collection: episodic_memory
    vector_size: 1536            # must match the embedder's output dimension

mcp:
  # Bring your own MCP servers. Discovered tools are namespaced `{server}__{tool}`.
  # By default a discovered tool is unreachable until allowlisted (per-user grant or
  # `tools.default_allowed`); set `auto_allow: true` on a trusted server to fold its
  # tools into the default allowlist at startup. A server that fails to connect within
  # `startup_timeout_s` is logged and skipped (the rest still load).
  startup_timeout_s: 30.0
  servers: []
    # - name: filesystem            # local stdio subprocess
    #   transport: stdio
    #   command: npx
    #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/data"]
    #   auto_allow: true
    # - name: search                # remote streamable HTTP
    #   transport: http
    #   url: ${SEARCH_MCP_URL:-http://localhost:9000/mcp}

tools:
  # Global fallback allowlist for users with no per-user grant in the store.
  default_allowed:
    - remember_fact
    - forget_fact
    - list_facts
    - recall
  # Optional per-tool execution policy (keyed by tool name). Unset fields fall back to
  # globals: timeout → agent.per_tool_timeout_s, rate limit → unlimited. Rate limits are
  # per-user, in-process (so a multi-worker deploy enforces ~workers × the configured
  # rate). Both a timed-out and a rate-limited call become an ok=False tool observation.
  definitions: {}
    # slow_external_api:
    #   timeout_s: 60.0            # generous timeout for a slow upstream
    # remember_fact:
    #   rate_limit_per_minute: 30  # cap a high-volume tool per user

# Tracing / observability via Langfuse (OpenTelemetry under the hood). Off by default
# so the service runs with zero external infra. Credentials are read from the env by
# the SDK (LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY / LANGFUSE_HOST) — never put keys
# here. Install with the `telemetry` extra (uv sync --extra telemetry).
telemetry:
  enabled: ${LANGFUSE_ENABLED:-false}
  service_name: agent_kit
  sample_rate: 1.0
  environment: ${LANGFUSE_ENVIRONMENT:-}
  release: ${LANGFUSE_RELEASE:-}

# Nested block handed wholesale to llm_kit's AppConfig.
llm_kit:
  llm:
    message_format: anthropic
    base_url: ${LLM_BASE_URL:-https://api.anthropic.com}
    chat_completions_path: /v1/messages
    model: ${LLM_MODEL:-claude-haiku-4-5-20251001}
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 4096
  embed:
    base_url: ${EMBED_BASE_URL:-http://127.0.0.1:1234}
    model: ${EMBED_MODEL:-text-embedding-qwen3-embedding-0.6b}
    api_key_env: OPENAI_API_KEY
  rate_limit:
    max_concurrent_requests: 16
    requests_per_minute: 500
